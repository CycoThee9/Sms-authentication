<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMS Authentication</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 400px;
    }

    h1 {
      color: #333;
      margin-bottom: 30px;
      text-align: center;
      font-size: 24px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #555;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 5px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus {
      outline: none;
      border-color: #667eea;
      box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
    }

    button {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      border: none;
      border-radius: 5px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .message {
      padding: 12px;
      margin-bottom: 20px;
      border-radius: 5px;
      text-align: center;
      font-size: 14px;
    }

    .success {
      background-color: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .error {
      background-color: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .info {
      background-color: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .resend-link {
      text-align: center;
      margin-top: 15px;
    }

    .resend-link a {
      color: #667eea;
      text-decoration: none;
      cursor: pointer;
      font-size: 14px;
    }

    .resend-link a:hover {
      text-decoration: underline;
    }

    .timer {
      text-align: center;
      color: #999;
      font-size: 12px;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- Step 1: Registration -->
    <div class="step active" id="step1">
      <h1>Create Account</h1>
      <div id="registerMessage"></div>
      <form id="registerForm">
        <div class="form-group">
          <label for="firstName">First Name</label>
          <input type="text" id="firstName" name="firstName" required>
        </div>
        <div class="form-group">
          <label for="lastName">Last Name</label>
          <input type="text" id="lastName" name="lastName" required>
        </div>
        <div class="form-group">
          <label for="phoneNumber">Phone Number</label>
          <input type="tel" id="phoneNumber" name="phoneNumber" placeholder="+1234567890" required>
        </div>
        <button type="submit" id="registerBtn">Send OTP</button>
      </form>
    </div>

    <!-- Step 2: OTP Verification -->
    <div class="step" id="step2">
      <h1>Verify OTP</h1>
      <div id="verifyMessage"></div>
      <form id="verifyForm">
        <div class="form-group">
          <label for="otp">Enter OTP</label>
          <input type="text" id="otp" name="otp" placeholder="000000" maxlength="6" required>
        </div>
        <button type="submit" id="verifyBtn">Verify OTP</button>
        <div class="resend-link">
          <a onclick="resendOTP()">Resend OTP</a>
        </div>
        <div class="timer" id="timer"></div>
      </form>
    </div>

    <!-- Step 3: Success -->
    <div class="step" id="step3">
      <h1>Success!</h1>
      <div id="successMessage"></div>
      <div id="userInfo" style="background: #f5f5f5; padding: 20px; border-radius: 5px; margin-top: 20px;">
        <p><strong>Name:</strong> <span id="displayName"></span></p>
        <p><strong>Phone:</strong> <span id="displayPhone"></span></p>
        <p><strong>User ID:</strong> <span id="displayUID" style="word-break: break-all;"></span></p>
      </div>
      <button onclick="location.reload()" style="margin-top: 20px;">Register Another Account</button>
    </div>
  </div>

  <script>
    const API_URL = 'http://localhost:5000/api/auth';
    let currentPhoneNumber = '';
    let otpTimer = 0;

    // Register Form
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const firstName = document.getElementById('firstName').value;
      const lastName = document.getElementById('lastName').value;
      const phoneNumber = document.getElementById('phoneNumber').value;

      try {
        const response = await fetch(`${API_URL}/register`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ firstName, lastName, phoneNumber }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Registration failed');
        }

        currentPhoneNumber = data.phoneNumber;
        showMessage('registerMessage', `OTP sent to ${phoneNumber}`, 'success');
        
        // Transition to Step 2
        setTimeout(() => {
          showStep('step2');
          startOTPTimer();
        }, 1000);
      } catch (error) {
        showMessage('registerMessage', error.message, 'error');
      }
    });

    // Verify OTP Form
    document.getElementById('verifyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const otp = document.getElementById('otp').value;

      try {
        const response = await fetch(`${API_URL}/verify-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: currentPhoneNumber, otp }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'OTP verification failed');
        }

        // Display success
        document.getElementById('displayName').textContent = `${data.user.firstName} ${data.user.lastName}`;
        document.getElementById('displayPhone').textContent = data.user.phoneNumber;
        document.getElementById('displayUID').textContent = data.uid;

        showMessage('successMessage', 'Account created successfully!', 'success');
        showStep('step3');
      } catch (error) {
        showMessage('verifyMessage', error.message, 'error');
      }
    });

    // Resend OTP
    async function resendOTP() {
      try {
        const response = await fetch(`${API_URL}/resend-otp`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ phoneNumber: currentPhoneNumber }),
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || 'Resend failed');
        }

        showMessage('verifyMessage', 'New OTP sent to your phone', 'info');
        document.getElementById('otp').value = '';
        startOTPTimer();
      } catch (error) {
        showMessage('verifyMessage', error.message, 'error');
      }
    }

    // Helper Functions
    function showStep(stepId) {
      document.querySelectorAll('.step').forEach((step) => {
        step.classList.remove('active');
      });
      document.getElementById(stepId).classList.add('active');
    }

    function showMessage(elementId, message, type) {
      const element = document.getElementById(elementId);
      element.textContent = message;
      element.className = `message ${type}`;
    }

    function startOTPTimer() {
      otpTimer = 300; // 5 minutes
      updateTimer();
    }

    function updateTimer() {
      const timerElement = document.getElementById('timer');
      const minutes = Math.floor(otpTimer / 60);
      const seconds = otpTimer % 60;

      if (otpTimer > 0) {
        timerElement.textContent = `OTP expires in: ${minutes}:${seconds < 10 ? '0' : ''}${seconds}`;
        otpTimer--;
        setTimeout(updateTimer, 1000);
      } else {
        timerElement.textContent = 'OTP expired. Please request a new one.';
      }
    }
  </script>
</body>
</html>
